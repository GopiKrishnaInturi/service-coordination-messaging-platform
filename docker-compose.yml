version: '3.9'

services:
  coordination:
    build: .
    ports:
      - "8110:8110"
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: coordination
      POSTGRES_PASSWORD: coordination
      POSTGRES_DB: platformdb
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"